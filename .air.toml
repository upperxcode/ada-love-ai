[build]
  # Forçamos o build nativo Wayland com recompilação total
  cmd = "go build -tags wayland -v -a -o ./tmp/main ."
  full_bin = "env FYNE_VIDEO=wayland ./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  
  # CRUCIAL: Excluir pastas que geram loop de memória
  exclude_dir = ["bin", "tmp", "script", "data", ".git"]
  
  # Aumente o delay para evitar que o Air tente rebuildar antes de terminar o anterior
  delay = 2000 
  stop_on_error = true

[screen]
  clear_on_rebuild = true